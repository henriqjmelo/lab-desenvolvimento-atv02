<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Lista de Clientes</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1 class="my-4">Clientes</h1>
    <a href="/clientes/new" class="btn btn-primary mb-3">Adicionar Novo Cliente</a>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>RG</th>
            <th>CPF</th>
            <th>Nome</th>
            <th>Endereço</th>
            <th>Profissão</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="cliente : ${clientes}">
            <td th:text="${cliente.id}"></td>
            <td th:text="${cliente.rg}"></td>
            <td th:text="${cliente.cpf}"></td>
            <td th:text="${cliente.nome}"></td>
            <td th:text="${cliente.endereco}"></td>
            <td th:text="${cliente.profissao}"></td>
            <td>
                <a th:href="@{/clientes/edit/{id}(id=${cliente.id})}" class="btn btn-sm btn-info">Editar</a>
                <a th:href="@{/clientes/delete/{id}(id=${cliente.id})}" class="btn btn-sm btn-danger">Excluir</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
