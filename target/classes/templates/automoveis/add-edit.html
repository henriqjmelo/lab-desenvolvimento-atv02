<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Adicionar/Editar Automóvel</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1 class="my-4" th:text="${automovel.id == null ? 'Adicionar Novo Automóvel' : 'Editar Automóvel'}"></h1>
    <form th:action="${automovel.id == null ? '/automoveis' : '/automoveis/edit/' + automovel.id}" th:object="${automovel}" method="post">
        <div class="form-group">
            <label for="matricula">Matrícula:</label>
            <input type="text" id="matricula" th:field="*{matricula}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="ano">Ano:</label>
            <input type="number" id="ano" th:field="*{ano}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="marca">Marca:</label>
            <input type="text" id="marca" th:field="*{marca}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="modelo">Modelo:</label>
            <input type="text" id="modelo" th:field="*{modelo}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="placa">Placa:</label>
            <input type="text" id="placa" th:field="*{placa}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/automoveis" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
