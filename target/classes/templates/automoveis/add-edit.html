<!DOCTYPE html>
<html>
<head>
    <title>Automovel - Sistema de Aluguel de Carros</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { max-width: 650px; margin: 50px auto; background: white; padding: 30px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; cursor: pointer; border: none; }
        button:hover { background-color: #218838; }
        a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1 th:if="${automovel.id != null}">Editar Automovel</h1>
        <h1 th:unless="${automovel.id != null}">Novo Automovel</h1>
        <form method="POST" th:action="${automovel.id != null} ? @{/automoveis/edit/{id}(id=${automovel.id})} : @{/automoveis/}">
            <div class="form-group">
                <label>Matricula:</label>
                <input type="text" name="matricula" th:value="${automovel.matricula}" required>
            </div>
            <div class="form-group">
                <label>Ano:</label>
                <input type="number" name="ano" th:value="${automovel.ano}" required>
            </div>
            <div class="form-group">
                <label>Marca:</label>
                <input type="text" name="marca" th:value="${automovel.marca}" required>
            </div>
            <div class="form-group">
                <label>Modelo:</label>
                <input type="text" name="modelo" th:value="${automovel.modelo}" required>
            </div>
            <div class="form-group">
                <label>Placa:</label>
                <input type="text" name="placa" th:value="${automovel.placa}" required>
            </div>
            <div class="form-group">
                <label>Tipo de Propriedade:</label>
                <select name="tipoPropriedade">
                    <option value="">Selecione...</option>
                    <option value="CLIENTE" th:selected="${automovel.tipoPropriedade == 'CLIENTE'}">CLIENTE</option>
                    <option value="BANCO" th:selected="${automovel.tipoPropriedade == 'BANCO'}">BANCO</option>
                    <option value="EMPRESA" th:selected="${automovel.tipoPropriedade == 'EMPRESA'}">EMPRESA</option>
                </select>
            </div>
            <div class="form-group">
                <label>ID do Proprietario:</label>
                <input type="number" name="idProprietario" th:value="${automovel.idProprietario}">
            </div>
            <div class="form-group">
                <label>Nome do Proprietario:</label>
                <input type="text" name="nomeProprietario" th:value="${automovel.nomeProprietario}">
            </div>
            <div class="form-group">
                <label>Status do Veiculo:</label>
                <select name="statusVeiculo">
                    <option value="DISPONIVEL" th:selected="${automovel.statusVeiculo == 'DISPONIVEL'}">DISPONIVEL</option>
                    <option value="ALUGADO" th:selected="${automovel.statusVeiculo == 'ALUGADO'}">ALUGADO</option>
                    <option value="MANUTENCAO" th:selected="${automovel.statusVeiculo == 'MANUTENCAO'}">MANUTENCAO</option>
                </select>
            </div>
            <button type="submit">Salvar</button>
        </form>
        <div style="margin-top: 20px;">
            <a href="/automoveis">Voltar</a>
        </div>
    </div>
</body>
</html>
