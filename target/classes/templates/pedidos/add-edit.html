<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Adicionar/Editar Pedido de Aluguel</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1 class="my-4" th:text="${pedido.id == null ? 'Adicionar Novo Pedido de Aluguel' : 'Editar Pedido de Aluguel'}"></h1>
    <form th:action="${pedido.id == null ? '/pedidos' : '/pedidos/edit/' + pedido.id}" th:object="${pedido}" method="post">
        <div class="form-group">
            <label for="status">Status:</label>
            <input type="text" id="status" th:field="*{status}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="dataRetirada">Data de Retirada:</label>
            <input type="date" id="dataRetirada" th:field="*{dataRetirada}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="dataDevolucao">Data de Devolução:</label>
            <input type="date" id="dataDevolucao" th:field="*{dataDevolucao}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="cliente">Cliente:</label>
            <select id="cliente" th:field="*{cliente}" class="form-control" required>
                <option th:each="cliente : ${clientes}" th:value="${cliente.id}" th:text="${cliente.nome}"></option>
            </select>
        </div>
        <div class="form-group">
            <label for="automovel">Automóvel:</label>
            <select id="automovel" th:field="*{automovel}" class="form-control" required>
                <option th:each="automovel : ${automoveis}" th:value="${automovel.id}" th:text="${automovel.marca + ' ' + automovel.modelo + ' (' + automovel.placa + ')'}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/pedidos" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
