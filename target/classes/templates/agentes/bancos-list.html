<!DOCTYPE html>
<html>
<head>
    <title>Bancos - Sistema de Aluguel de Carros</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 30px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f5f5f5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Bancos</h1>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>CNPJ</th>
                    <th>Endereco</th>
                    <th>Telefone</th>
                </tr>
            </thead>
            <tbody>
                [# th:each="agente : ${agentes}" ]
                <tr>
                    <td>[(${agente.id})]</td>
                    <td>[(${agente.nome})]</td>
                    <td>[(${agente.cnpj})]</td>
                    <td>[(${agente.endereco})]</td>
                    <td>[(${agente.telefone})]</td>
                </tr>
                [/]
            </tbody>
        </table>
        <div style="margin-top: 20px;">
            <a href="/agentes">Voltar</a>
        </div>
    </div>
</body>
</html>
