<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cadastro - Sistema de Aluguel de Carros</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; cursor: pointer; border: none; margin-top: 10px; }
        button:hover { background-color: #218838; }
        a { color: #007bff; text-decoration: none; }
        .links { text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Cadastro de Novo Usuario</h1>
        
        <form method="POST" action="/auth/cadastro">
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" name="nome" required>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" name="senha" required>
            </div>
            <div class="form-group">
                <label>Tipo de Usuario:</label>
                <select name="tipo" required>
                    <option value="">Selecione...</option>
                    <option value="CLIENTE">Cliente</option>
                    <option value="BANCO">Banco</option>
                    <option value="EMPRESA">Empresa</option>
                </select>
            </div>
            <button type="submit">Cadastrar</button>
        </form>
        
        <div class="links">
            <p>Ja tem conta? <a href="/auth/login">Faca login aqui</a></p>
        </div>
    </div>
</body>
</html>
