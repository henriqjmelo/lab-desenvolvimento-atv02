<!DOCTYPE html>
<html>
<head>
    <title>Adicionar/Editar Agente - Sistema de Aluguel de Carros</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; cursor: pointer; border: none; }
        button:hover { background-color: #218838; }
        a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1 th:if="${agente.id != null}">Editar Agente</h1>
        <h1 th:unless="${agente.id != null}">Novo Agente</h1>

        <form method="POST" th:if="${agente.id == null}" action="/agentes/">
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" name="nome" th:value="${agente.nome}" required>
            </div>
            <div class="form-group">
                <label>CNPJ:</label>
                <input type="text" name="cnpj" th:value="${agente.cnpj}" required>
            </div>
            <div class="form-group">
                <label>Endereco:</label>
                <input type="text" name="endereco" th:value="${agente.endereco}">
            </div>
            <div class="form-group">
                <label>Telefone:</label>
                <input type="text" name="telefone" th:value="${agente.telefone}">
            </div>
            <div class="form-group">
                <label>Tipo de Agente:</label>
                <select name="tipo" required>
                    <option value="">Selecione...</option>
                    <option th:each="tipo : ${tiposAgente}" th:value="${tipo}" th:selected="${agente.tipo == tipo}" th:text="${tipo.descricao}"></option>
                </select>
            </div>
            <button type="submit">Adicionar</button>
        </form>

        <form method="POST" th:if="${agente.id != null}" th:action="@{/agentes/edit/{id}(id=${agente.id})}">
            <div class="form-group">
                <label>Nome:</label>
                <input type="text" name="nome" th:value="${agente.nome}" required>
            </div>
            <div class="form-group">
                <label>CNPJ:</label>
                <input type="text" name="cnpj" th:value="${agente.cnpj}" required>
            </div>
            <div class="form-group">
                <label>Endereco:</label>
                <input type="text" name="endereco" th:value="${agente.endereco}">
            </div>
            <div class="form-group">
                <label>Telefone:</label>
                <input type="text" name="telefone" th:value="${agente.telefone}">
            </div>
            <div class="form-group">
                <label>Tipo de Agente:</label>
                <select name="tipo" required>
                    <option value="">Selecione...</option>
                    <option th:each="tipo : ${tiposAgente}" th:value="${tipo}" th:selected="${agente.tipo == tipo}" th:text="${tipo.descricao}"></option>
                </select>
            </div>
            <button type="submit">Atualizar</button>
        </form>

        <div style="margin-top: 20px;">
            <a href="/agentes">Voltar</a>
        </div>
    </div>
</body>
</html>
