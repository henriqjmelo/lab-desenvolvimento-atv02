<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Adicionar/Editar Cliente</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
<div class="container">
    <h1 class="my-4" th:text="${cliente.id == null ? 'Adicionar Novo Cliente' : 'Editar Cliente'}"></h1>
    <form th:action="${cliente.id == null ? '/clientes' : '/clientes/edit/' + cliente.id}" th:object="${cliente}" method="post">
        <div class="form-group">
            <label for="rg">RG:</label>
            <input type="text" id="rg" th:field="*{rg}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="cpf">CPF:</label>
            <input type="text" id="cpf" th:field="*{cpf}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" th:field="*{nome}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="endereco">Endereço:</label>
            <input type="text" id="endereco" th:field="*{endereco}" class="form-control" required>
        </div>
        <div class="form-group">
            <label for="profissao">Profissão:</label>
            <input type="text" id="profissao" th:field="*{profissao}" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-primary">Salvar</button>
        <a href="/clientes" class="btn btn-secondary">Cancelar</a>
    </form>
</div>
</body>
</html>
