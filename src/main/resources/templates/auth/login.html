<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Login - Sistema de Aluguel de Carros</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { max-width: 400px; margin: 100px auto; background: white; padding: 30px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; }
        input, button { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        input { margin-bottom: 10px; }
        button { background-color: #007bff; color: white; cursor: pointer; border: none; }
        button:hover { background-color: #0056b3; }
        .error { color: #d9534f; margin-bottom: 10px; }
        .success { color: #5cb85c; margin-bottom: 10px; }
        a { color: #007bff; text-decoration: none; }
        .links { text-align: center; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Login</h1>
        
        <div class="error" th:if="${erro}" th:text="${erro}"></div>
        <div class="success" th:if="${sucesso}" th:text="${sucesso}"></div>
        
        <form method="POST" action="/auth/login">
            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email" required>
            </div>
            <div class="form-group">
                <label>Senha:</label>
                <input type="password" name="senha" required>
            </div>
            <button type="submit">Entrar</button>
        </form>
        
        <div class="links">
            <p>Nao tem conta? <a href="/auth/cadastro">Cadastre-se aqui</a></p>
        </div>
    </div>
</body>
</html>
