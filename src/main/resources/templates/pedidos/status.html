<!DOCTYPE html>
<html>
<head>
    <title>Status do Pedido - Sistema de Aluguel de Carros</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { max-width: 900px; margin: 20px auto; background: white; padding: 30px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .card { border: 1px solid #ddd; border-radius: 5px; padding: 16px; margin-top: 16px; }
        .card h2 { margin-top: 0; color: #007bff; font-size: 20px; }
        p { margin: 8px 0; }
        .status { display: inline-block; padding: 4px 10px; border-radius: 4px; color: white; background-color: #6c757d; }
        a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Status do Pedido <span th:if="${pedido != null}" th:text="${pedido.id}"></span></h1>

        <div class="card" th:if="${pedido != null}">
            <h2>Detalhes do Pedido</h2>
            <p><strong>Status:</strong> <span class="status" th:text="${pedido.status}"></span></p>
            <p><strong>Parecer Financeiro:</strong> <span th:text="${pedido.parecer}"></span></p>
            <p><strong>Motivo da Rejeicao:</strong> <span th:text="${pedido.motivoRejeicao}"></span></p>
            <p><strong>Data do Pedido:</strong> <span th:if="${pedido.dataPedido != null}" th:text="${#dates.format(pedido.dataPedido, 'dd/MM/yyyy HH:mm')}"></span></p>
            <p><strong>Data de Retirada:</strong> <span th:if="${pedido.dataRetirada != null}" th:text="${#dates.format(pedido.dataRetirada, 'dd/MM/yyyy')}"></span></p>
            <p><strong>Data de Devolucao:</strong> <span th:if="${pedido.dataDevolucao != null}" th:text="${#dates.format(pedido.dataDevolucao, 'dd/MM/yyyy')}"></span></p>
            <p><strong>Valor da Diaria:</strong> <span th:text="${pedido.valorDiaria}"></span></p>
        </div>

        <div class="card" th:if="${pedido != null and pedido.cliente != null}">
            <h2>Cliente</h2>
            <p><strong>Nome:</strong> <span th:text="${pedido.cliente.nome}"></span></p>
            <p><strong>CPF:</strong> <span th:text="${pedido.cliente.cpf}"></span></p>
            <p><strong>RG:</strong> <span th:text="${pedido.cliente.rg}"></span></p>
            <p><strong>Endereco:</strong> <span th:text="${pedido.cliente.endereco}"></span></p>
            <p><strong>Profissao:</strong> <span th:text="${pedido.cliente.profissao}"></span></p>
        </div>

        <div class="card" th:if="${pedido != null and pedido.automovel != null}">
            <h2>Automovel</h2>
            <p><strong>Marca:</strong> <span th:text="${pedido.automovel.marca}"></span></p>
            <p><strong>Modelo:</strong> <span th:text="${pedido.automovel.modelo}"></span></p>
            <p><strong>Ano:</strong> <span th:text="${pedido.automovel.ano}"></span></p>
            <p><strong>Placa:</strong> <span th:text="${pedido.automovel.placa}"></span></p>
            <p><strong>Matricula:</strong> <span th:text="${pedido.automovel.matricula}"></span></p>
            <p><strong>Status do Veiculo:</strong> <span th:text="${pedido.automovel.statusVeiculo}"></span></p>
        </div>

        <div style="margin-top: 20px;">
            <a href="/pedidos">Voltar</a>
        </div>
    </div>
</body>
</html>
