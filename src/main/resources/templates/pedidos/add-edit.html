<!DOCTYPE html>
<html>
<head>
    <title>Pedido - Sistema de Aluguel de Carros</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { max-width: 700px; margin: 50px auto; background: white; padding: 30px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        input, select, button { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; cursor: pointer; border: none; }
        button:hover { background-color: #218838; }
        a { color: #007bff; text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1 th:if="${pedido.id != null}">Editar Pedido</h1>
        <h1 th:unless="${pedido.id != null}">Novo Pedido</h1>
        <form method="POST" th:action="${pedido.id != null} ? @{/pedidos/edit/{id}(id=${pedido.id})} : @{/pedidos/}">
            <div class="form-group">
                <label>Status:</label>
                <input type="text" name="status" th:value="${pedido.status}">
            </div>
            <div class="form-group">
                <label>Data de Retirada:</label>
                <input type="date" name="dataRetirada">
            </div>
            <div class="form-group">
                <label>Data de Devolucao:</label>
                <input type="date" name="dataDevolucao">
            </div>
            <div class="form-group">
                <label>Valor da Diaria:</label>
                <input type="number" step="0.01" name="valorDiaria" [# th:if="${pedido.valorDiaria}" ]value="[(${pedido.valorDiaria})]"[/]>
            </div>
            <div class="form-group">
                <label>Cliente:</label>
                <select name="cliente.id" required>
                    <option value="">Selecione...</option>
                    <option th:each="cliente : ${clientes}" th:value="${cliente.id}" th:selected="${pedido.cliente != null and pedido.cliente.id == cliente.id}" th:text="${cliente.nome}"></option>
                </select>
            </div>
            <div class="form-group">
                <label>Automovel:</label>
                <select name="automovel.id" required>
                    <option value="">Selecione...</option>
                    <option th:each="automovel : ${automoveis}" th:value="${automovel.id}" th:selected="${pedido.automovel != null and pedido.automovel.id == automovel.id}" th:text="${automovel.marca + ' ' + automovel.modelo + ' (' + automovel.placa + ')'}"></option>
                </select>
            </div>
            <button type="submit">Salvar</button>
        </form>
        <div style="margin-top: 20px;">
            <a href="/pedidos">Voltar</a>
        </div>
    </div>
</body>
</html>
