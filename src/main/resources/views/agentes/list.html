<!DOCTYPE html>
<html>
<head>
    <title>Agentes - Sistema de Aluguel de Carros</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { max-width: 1000px; margin: 20px auto; background: white; padding: 30px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .btn-novo { background-color: #28a745; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; display: inline-block; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #007bff; color: white; }
        tr:hover { background-color: #f5f5f5; }
        .btn-edit { background-color: #007bff; color: white; padding: 5px 10px; text-decoration: none; border-radius: 4px; }
        .btn-delete { background-color: #dc3545; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; }
        .btn-dashboard { background-color: #17a2b8; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; display: inline-block; margin-right: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Gerenciamento de Agentes</h1>

        <a href="/agentes/new" class="btn-novo">+ Novo Agente</a>
        <a href="/agentes/dashboard" class="btn-dashboard">Dashboard</a>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>CNPJ</th>
                    <th>Tipo</th>
                    <th>Endereco</th>
                    <th>Telefone</th>
                    <th>Acoes</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="agente : ${agentes}">
                    <td th:text="${agente.id}"></td>
                    <td th:text="${agente.nome}"></td>
                    <td th:text="${agente.cnpj}"></td>
                    <td th:text="${agente.tipo.descricao}"></td>
                    <td th:text="${agente.endereco}"></td>
                    <td th:text="${agente.telefone}"></td>
                    <td>
                        <a th:href="@{/agentes/edit/{id}(id=${agente.id})}" class="btn-edit">Editar</a>
                        <form method="POST" th:action="@{/agentes/delete/{id}(id=${agente.id})}" style="display: inline;">
                            <button type="submit" class="btn-delete" onclick="return confirm('Tem certeza?')">Deletar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

        <div style="margin-top: 20px;">
            <a href="/clientes">Voltar</a>
        </div>
    </div>
</body>
</html>
