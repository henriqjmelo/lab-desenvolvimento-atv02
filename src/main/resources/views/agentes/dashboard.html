<!DOCTYPE html>
<html>
<head>
    <title>Dashboard Agentes - Sistema de Aluguel de Carros</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; }
        .container { max-width: 1200px; margin: 20px auto; background: white; padding: 30px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .dashboard-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin: 20px 0; }
        .dashboard-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; text-align: center; }
        .dashboard-card h3 { margin: 0; padding-bottom: 10px; font-size: 14px; }
        .dashboard-card .number { font-size: 32px; font-weight: bold; }
        .btn-action { display: inline-block; background-color: #28a745; color: white; padding: 10px 20px; text-decoration: none; border-radius: 4px; margin-top: 10px; }
        .btn-action:hover { background-color: #218838; }
        .pedidos-section { margin-top: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Dashboard - Agentes</h1>
        
        <div class="dashboard-grid">
            <div class="dashboard-card">
                <h3>Total de Agentes</h3>
                <div class="number" th:text="${agentes.size()}"></div>
            </div>
            <div class="dashboard-card">
                <h3>Bancos</h3>
                <div class="number" th:text="${bancosCount}"></div>
            </div>
            <div class="dashboard-card">
                <h3>Empresas</h3>
                <div class="number" th:text="${empresasCount}"></div>
            </div>
        </div>
        
        <div class="pedidos-section">
            <a href="/pedidos/analise-financeira" class="btn-action">Analisar Pedidos Financeiamente</a>
            <a href="/pedidos" class="btn-action">Ver Todos os Pedidos</a>
        </div>
        
        <div style="margin-top: 20px;">
            <a href="/clientes">Voltar</a>
        </div>
    </div>
</body>
</html>
