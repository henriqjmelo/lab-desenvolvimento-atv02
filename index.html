<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sistema de Aluguel de Carros</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="topo">
    <div class="overlay"></div>
    <div class="topo-conteudo">
      <h1>Sistema de Aluguel de Carros</h1>
      <p>Gestao de pedidos, contratos e construcao dinamica das paginas web</p>
    </div>
  </header>
    </section>

    <section class="grid-principal">
      <div class="coluna-esquerda">
        <section class="painel">
          <h2>Login</h2>
          <form id="formLogin" class="formulario">
            <div class="campo">
              <label for="loginCpf">CPF</label>
              <input type="text" id="loginCpf" placeholder="Digite seu CPF" required />
            </div>

            <div class="campo">
              <label for="loginNome">Nome</label>
              <input type="text" id="loginNome" placeholder="Digite seu nome" required />
            </div>

            <button type="submit">Entrar no Sistema</button>
            <p id="mensagemLogin" class="mensagem"></p>
          </form>
        </section>

        <section class="painel">
          <h2>Cadastro do Cliente</h2>
          <form id="formCadastro" class="formulario">
            <div class="grid">
              <div class="campo">
                <label for="nome">Nome</label>
                <input type="text" id="nome" required />
              </div>

              <div class="campo">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" required />
              </div>

              <div class="campo">
                <label for="rg">RG</label>
                <input type="text" id="rg" required />
              </div>

              <div class="campo">
                <label for="endereco">Endereco</label>
                <input type="text" id="endereco" required />
              </div>

              <div class="campo">
                <label for="profissao">Profissao</label>
                <input type="text" id="profissao" required />
              </div>

              <div class="campo">
                <label for="empregador1">Empregador 1</label>
                <input type="text" id="empregador1" />
              </div>

              <div class="campo">
                <label for="renda1">Rendimento 1</label>
                <input type="number" id="renda1" />
              </div>

              <div class="campo">
                <label for="empregador2">Empregador 2</label>
                <input type="text" id="empregador2" />
              </div>

              <div class="campo">
                <label for="renda2">Rendimento 2</label>
                <input type="number" id="renda2" />
              </div>

              <div class="campo">
                <label for="empregador3">Empregador 3</label>
                <input type="text" id="empregador3" />
              </div>

              <div class="campo">
                <label for="renda3">Rendimento 3</label>
                <input type="number" id="renda3" />
              </div>
            </div>

            <button type="submit">Cadastrar Cliente</button>
            <p id="mensagemCadastro" class="mensagem"></p>
          </form>
        </section>

        <section class="painel">
          <h2>Pedido de Aluguel</h2>
          <form id="formPedido" class="formulario">
            <div class="grid">
              <div class="campo">
                <label for="matricula">Matricula</label>
                <input type="text" id="matricula" required />
              </div>

              <div class="campo">
                <label for="ano">Ano</label>
                <input type="number" id="ano" required />
              </div>

              <div class="campo">
                <label for="marca">Marca</label>
                <input type="text" id="marca" required />
              </div>

              <div class="campo">
                <label for="modelo">Modelo</label>
                <input type="text" id="modelo" required />
              </div>

              <div class="campo">
                <label for="placa">Placa</label>
                <input type="text" id="placa" required />
              </div>

              <div class="campo">
                <label for="tipoProprietario">Proprietario</label>
                <select id="tipoProprietario" required>
                  <option value="">Selecione</option>
                  <option value="Cliente">Cliente</option>
                  <option value="Empresa">Empresa</option>
                  <option value="Banco">Banco</option>
                </select>
              </div>

              <div class="campo">
                <label for="temCredito">Contrato de credito</label>
                <select id="temCredito" required>
                  <option value="">Selecione</option>
                  <option value="Sim">Sim</option>
                  <option value="Nao">Nao</option>
                </select>
              </div>

              <div class="campo">
                <label for="bancoAgente">Banco Agente</label>
                <input type="text" id="bancoAgente" placeholder="Obrigatorio se houver credito" />
              </div>
            </div>

            <button type="submit">Registrar Pedido</button>
            <p id="mensagemPedido" class="mensagem"></p>
          </form>
        </section>
      </div>

      <div class="coluna-direita">
        <section class="painel">
          <h2>Area dos Agentes</h2>
          <form id="formAgente" class="formulario">
            <div class="campo">
              <label for="pedidoSelecionado">Pedido</label>
              <select id="pedidoSelecionado" required>
                <option value="">Selecione um pedido</option>
              </select>
            </div>

            <div class="campo">
              <label for="novoStatus">Novo Status</label>
              <select id="novoStatus" required>
                <option value="">Selecione</option>
                <option value="Em analise financeira">Em analise financeira</option>
                <option value="Aprovado">Aprovado</option>
                <option value="Rejeitado">Rejeitado</option>
                <option value="Contrato disponivel">Contrato disponivel</option>
              </select>
            </div>

            <div class="campo">
              <label for="observacaoAgente">Observacao</label>
              <input type="text" id="observacaoAgente" placeholder="Observacao do agente" />
            </div>

            <button type="submit">Atualizar Pedido</button>
            <p id="mensagemAgente" class="mensagem"></p>
          </form>
        </section>

        <section class="painel">
          <h2>Pedidos Registrados</h2>
          <div id="listaPedidos" class="lista-pedidos">
            <p class="vazio">Nenhum pedido cadastrado ainda.</p>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
